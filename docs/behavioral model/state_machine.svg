<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560">
  <defs>
    <marker id="arrTeal" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="#0d9488"/>
    </marker>
    <marker id="arrBlue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="#16a34a"/>
    </marker>
    <marker id="arrYellow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="#ca8a04"/>
    </marker>
    <marker id="arrRed" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="#dc2626"/>
    </marker>
    <marker id="arrGray" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="560" fill="white"/>

  <!-- Title -->
  <text x="440" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#134e4a">Validation Run — State Machine</text>
  <text x="440" y="50" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748b">DataNexus  ·  Behavioral Model  ·  5 States</text>
  <line x1="60" y1="60" x2="820" y2="60" stroke="#0d9488" stroke-width="1.5"/>

  <!-- ═══ NODES ═══ -->

  <!-- START dot -->
  <circle cx="440" cy="110" r="14" fill="#0d9488"/>

  <!-- PENDING -->
  <rect x="320" y="150" width="240" height="60" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="440" y="175" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#0d9488">PENDING</text>
  <text x="440" y="192" text-anchor="middle" font-family="Arial" font-size="10" fill="#475569">Loading &amp; validating config</text>

  <!-- RUNNING -->
  <rect x="320" y="260" width="240" height="60" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="440" y="285" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1d4ed8">RUNNING</text>
  <text x="440" y="302" text-anchor="middle" font-family="Arial" font-size="10" fill="#475569">Profiling &amp; executing checks</text>

  <!-- PASS -->
  <rect x="80" y="390" width="200" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="180" y="415" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#16a34a">PASS</text>
  <text x="180" y="432" text-anchor="middle" font-family="Arial" font-size="10" fill="#475569">Score ≥ threshold</text>

  <!-- FAIL -->
  <rect x="340" y="390" width="200" height="60" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="440" y="415" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#ca8a04">FAIL</text>
  <text x="440" y="432" text-anchor="middle" font-family="Arial" font-size="10" fill="#475569">Score &lt; threshold · alerts fired</text>

  <!-- ERROR -->
  <rect x="600" y="390" width="200" height="60" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="700" y="415" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#dc2626">ERROR</text>
  <text x="700" y="432" text-anchor="middle" font-family="Arial" font-size="10" fill="#475569">Technical failure</text>

  <!-- END dots -->
  <circle cx="180" cy="510" r="12" fill="white" stroke="#16a34a" stroke-width="2.5"/>
  <circle cx="180" cy="510" r="7"  fill="#16a34a"/>
  <circle cx="440" cy="510" r="12" fill="white" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="440" cy="510" r="7"  fill="#ca8a04"/>
  <circle cx="700" cy="510" r="12" fill="white" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="700" cy="510" r="7"  fill="#dc2626"/>

  <!-- ═══ TRANSITIONS ═══ -->

  <!-- START → PENDING -->
  <line x1="440" y1="124" x2="440" y2="150" stroke="#0d9488" stroke-width="2" marker-end="url(#arrTeal)"/>
  <text x="450" y="140" font-family="Arial" font-size="9" fill="#475569">trigger</text>

  <!-- PENDING → RUNNING (config valid) -->
  <line x1="440" y1="210" x2="440" y2="260" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrBlue)"/>
  <text x="450" y="240" font-family="Arial" font-size="9" fill="#1d4ed8">config valid</text>

  <!-- PENDING → ERROR (config invalid) -->
  <path d="M560,180 Q720,180 720,300 Q720,375 700,390" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <text x="690" y="270" font-family="Arial" font-size="9" fill="#dc2626">config invalid</text>

  <!-- RUNNING → PASS -->
  <path d="M370,320 Q300,340 260,370 Q230,385 225,390" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="252" y="352" text-anchor="middle" font-family="Arial" font-size="9" fill="#16a34a">all checks pass</text>

  <!-- RUNNING → FAIL -->
  <line x1="440" y1="320" x2="440" y2="390" stroke="#ca8a04" stroke-width="2" marker-end="url(#arrYellow)"/>
  <text x="452" y="360" font-family="Arial" font-size="9" fill="#ca8a04">score &lt; threshold</text>

  <!-- RUNNING → ERROR -->
  <path d="M520,305 Q620,305 640,370 Q650,385 660,390" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <text x="610" y="345" font-family="Arial" font-size="9" fill="#dc2626">connection error</text>

  <!-- PASS → end -->
  <line x1="180" y1="450" x2="180" y2="498" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrGreen)"/>

  <!-- FAIL → end -->
  <line x1="440" y1="450" x2="440" y2="498" stroke="#ca8a04" stroke-width="1.8" marker-end="url(#arrYellow)"/>

  <!-- ERROR → end -->
  <line x1="700" y1="450" x2="700" y2="498" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arrRed)"/>

  <!-- FAIL → PENDING (retry) -->
  <path d="M340,430 Q240,450 220,400 Q200,350 200,230 Q200,165 320,175" fill="none" stroke="#ca8a04" stroke-width="1.3" stroke-dasharray="6,3" marker-end="url(#arrYellow)"/>
  <text x="192" y="320" text-anchor="end" font-family="Arial" font-size="9" fill="#ca8a04">retry</text>

  <!-- ERROR → PENDING (retry) -->
  <path d="M600,410 Q570,410 558,390 Q540,350 540,250 Q540,185 560,170" fill="none" stroke="#dc2626" stroke-width="1.3" stroke-dasharray="6,3" marker-end="url(#arrRed)"/>
  <text x="575" y="292" font-family="Arial" font-size="9" fill="#dc2626">retry</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="280" y="526" width="320" height="24" rx="4" fill="white" stroke="#e2e8f0"/>
  <circle cx="300" cy="538" r="6" fill="#0d9488"/>
  <text x="312" y="542" font-family="Arial" font-size="9" fill="#475569">initial state</text>
  <circle cx="390" cy="538" r="6" fill="white" stroke="#475569" stroke-width="1.5"/>
  <circle cx="390" cy="538" r="3" fill="#475569"/>
  <text x="402" y="542" font-family="Arial" font-size="9" fill="#475569">terminal state</text>
  <line x1="478" y1="538" x2="504" y2="538" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4,2"/>
  <text x="510" y="542" font-family="Arial" font-size="9" fill="#475569">error path</text>
</svg>
