<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 860" width="1100" height="860">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="#64748b"/>
    </marker>
    <marker id="arrOpen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M1,1 L9,4 L1,7" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </marker>
    <marker id="arrBlue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="#0369a1"/>
    </marker>
    <marker id="arrPurple" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L8,3.5 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="860" fill="white"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-family="Arial" font-size="19" font-weight="bold" fill="#134e4a">DataNexus — Use Case Diagram</text>
  <text x="550" y="52" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748b">Behavioral Model  ·  6 Actors  ·  13 Use Cases</text>
  <line x1="80" y1="62" x2="1020" y2="62" stroke="#0d9488" stroke-width="1.5"/>

  <!-- ═══ SYSTEM BOUNDARY ═══ -->
  <rect x="210" y="76" width="680" height="752" rx="10"
        fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="550" y="96" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#0d9488">DataNexus System</text>

  <!-- ═══ LEFT ACTORS ═══ -->
  <!-- Data Engineer -->
  <g transform="translate(80,185)">
    <!-- stick figure -->
    <circle cx="30" cy="16" r="11" fill="none" stroke="#0d9488" stroke-width="2"/>
    <line x1="30" y1="27" x2="30" y2="60" stroke="#0d9488" stroke-width="2"/>
    <line x1="10" y1="40" x2="50" y2="40" stroke="#0d9488" stroke-width="2"/>
    <line x1="30" y1="60" x2="12" y2="80" stroke="#0d9488" stroke-width="2"/>
    <line x1="30" y1="60" x2="48" y2="80" stroke="#0d9488" stroke-width="2"/>
    <text x="30" y="97" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#134e4a">Data Engineer</text>
    <text x="30" y="110" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">«primary»</text>
  </g>

  <!-- Business Stakeholder -->
  <g transform="translate(40,380)">
    <circle cx="30" cy="16" r="11" fill="none" stroke="#134e4a" stroke-width="2"/>
    <line x1="30" y1="27" x2="30" y2="60" stroke="#134e4a" stroke-width="2"/>
    <line x1="10" y1="40" x2="50" y2="40" stroke="#134e4a" stroke-width="2"/>
    <line x1="30" y1="60" x2="12" y2="80" stroke="#134e4a" stroke-width="2"/>
    <line x1="30" y1="60" x2="48" y2="80" stroke="#134e4a" stroke-width="2"/>
    <text x="30" y="97" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#134e4a">Business</text>
    <text x="30" y="110" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#134e4a">Stakeholder</text>
  </g>

  <!-- Airflow -->
  <g transform="translate(42,570)">
    <rect x="4" y="0" width="52" height="36" rx="5" fill="none" stroke="#1e40af" stroke-width="2"/>
    <text x="30" y="14" text-anchor="middle" font-family="Arial" font-size="9" fill="#1e40af">⚙ ⚙</text>
    <text x="30" y="26" text-anchor="middle" font-family="Arial" font-size="8" fill="#1e40af">Airflow</text>
    <text x="30" y="53" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1e40af">Airflow</text>
    <text x="30" y="66" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">«scheduler»</text>
  </g>

  <!-- ═══ RIGHT ACTORS ═══ -->
  <!-- CI/CD -->
  <g transform="translate(970,210)">
    <rect x="4" y="0" width="52" height="36" rx="5" fill="none" stroke="#1e40af" stroke-width="2"/>
    <text x="30" y="22" text-anchor="middle" font-family="Arial" font-size="9" fill="#1e40af">CI / CD</text>
    <text x="30" y="53" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1e40af">CI/CD System</text>
    <text x="30" y="66" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">«GitHub Actions»</text>
  </g>

  <!-- Email Server -->
  <g transform="translate(968,440)">
    <rect x="4" y="0" width="52" height="36" rx="5" fill="none" stroke="#92400e" stroke-width="2"/>
    <text x="30" y="22" text-anchor="middle" font-family="Arial" font-size="9" fill="#92400e">[ EMAIL ]</text>
    <text x="30" y="53" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#92400e">Email Server</text>
    <text x="30" y="66" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">«SMTP»</text>
  </g>

  <!-- Slack -->
  <g transform="translate(970,630)">
    <rect x="4" y="0" width="52" height="36" rx="5" fill="none" stroke="#92400e" stroke-width="2"/>
    <text x="30" y="22" text-anchor="middle" font-family="Arial" font-size="9" fill="#92400e">[ SLACK ]</text>
    <text x="30" y="53" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#92400e">Slack API</text>
    <text x="30" y="66" text-anchor="middle" font-family="Arial" font-size="9" fill="#64748b">«webhook»</text>
  </g>

  <!-- ═══ USE CASES — Column 1 ═══ -->
  <!-- UC1 -->
  <ellipse cx="360" cy="160" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="360" y="155" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC1</text>
  <text x="360" y="169" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">Configure Validation Rules</text>

  <!-- UC2 -->
  <ellipse cx="360" cy="255" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="360" y="250" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC2</text>
  <text x="360" y="264" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">Run Data Validation</text>

  <!-- UC3 -->
  <ellipse cx="360" cy="350" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="360" y="345" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC3</text>
  <text x="360" y="359" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">View Validation Results</text>

  <!-- UC5 -->
  <ellipse cx="360" cy="445" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="360" y="440" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC5</text>
  <text x="360" y="454" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">View Dashboard</text>

  <!-- UC7 -->
  <ellipse cx="360" cy="540" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="360" y="535" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC7</text>
  <text x="360" y="549" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">Trigger via API</text>

  <!-- UC12 -->
  <ellipse cx="360" cy="635" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="360" y="630" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC12</text>
  <text x="360" y="644" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">Acknowledge Alert</text>

  <!-- UC13 -->
  <ellipse cx="360" cy="730" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="360" y="725" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC13</text>
  <text x="360" y="739" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">Generate Quality Report</text>

  <!-- ═══ USE CASES — Column 2 ═══ -->
  <!-- UC4 (include of UC2) -->
  <ellipse cx="600" cy="200" rx="90" ry="30" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
  <text x="600" y="195" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0369a1">UC4</text>
  <text x="600" y="209" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">Profile Dataset</text>

  <!-- UC6 -->
  <ellipse cx="600" cy="300" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="600" y="295" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC6</text>
  <text x="600" y="309" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">Manage Alerts</text>

  <!-- UC8 -->
  <ellipse cx="600" cy="400" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="600" y="395" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC8</text>
  <text x="600" y="409" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">Schedule Automated Runs</text>

  <!-- UC9 -->
  <ellipse cx="600" cy="500" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="600" y="495" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC9</text>
  <text x="600" y="509" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">Quality Gate Check</text>

  <!-- UC10 -->
  <ellipse cx="600" cy="600" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="600" y="595" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC10</text>
  <text x="600" y="609" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">Send Email Notification</text>

  <!-- UC11 -->
  <ellipse cx="600" cy="700" rx="90" ry="30" fill="white" stroke="#0d9488" stroke-width="1.8"/>
  <text x="600" y="695" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#134e4a">UC11</text>
  <text x="600" y="709" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#1e293b">Send Slack Notification</text>

  <!-- ═══ ACTOR → USE CASE LINES ═══ -->
  <!-- Data Engineer (cx≈110, cy≈265) → UC1,2,3,5,7,12 -->
  <line x1="140" y1="240" x2="270" y2="180" stroke="#0d9488" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="140" y1="250" x2="270" y2="255" stroke="#0d9488" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="140" y1="262" x2="270" y2="330" stroke="#0d9488" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="140" y1="272" x2="270" y2="430" stroke="#0d9488" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="140" y1="278" x2="270" y2="528" stroke="#0d9488" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="140" y1="284" x2="270" y2="622" stroke="#0d9488" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Business Stakeholder (cx≈70, cy≈460) → UC5, UC13 -->
  <line x1="100" y1="450" x2="270" y2="445" stroke="#134e4a" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="100" y1="466" x2="270" y2="720" stroke="#134e4a" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Airflow (cx≈72, cy≈597) → UC8 -->
  <line x1="102" y1="594" x2="510" y2="415" stroke="#1e40af" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- CI/CD (cx≈1000, cy≈246) → UC9 -->
  <line x1="970" y1="246" x2="690" y2="490" stroke="#1e40af" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- UC10 → Email -->
  <line x1="690" y1="600" x2="968" y2="463" stroke="#92400e" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <!-- UC11 → Slack -->
  <line x1="690" y1="700" x2="970" y2="663" stroke="#92400e" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ═══ INTERNAL RELATIONSHIPS ═══ -->
  <!-- UC2 «include» UC4 -->
  <line x1="450" y1="248" x2="510" y2="210" stroke="#0369a1" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrOpen)"/>
  <text x="476" y="224" text-anchor="middle" font-family="Arial" font-size="8.5" font-style="italic" fill="#0369a1">«include»</text>

  <!-- UC2 «extend» UC6 -->
  <line x1="450" y1="262" x2="510" y2="300" stroke="#7c3aed" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrOpen)"/>
  <text x="487" y="285" text-anchor="middle" font-family="Arial" font-size="8.5" font-style="italic" fill="#7c3aed">«extend»</text>

  <!-- UC6 «include» UC10 -->
  <line x1="600" y1="330" x2="600" y2="570" stroke="#0369a1" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrOpen)"/>
  <text x="616" y="456" text-anchor="start" font-family="Arial" font-size="8.5" font-style="italic" fill="#0369a1">«include»</text>

  <!-- UC6 «include» UC11 -->
  <line x1="620" y1="330" x2="640" y2="670" stroke="#0369a1" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrOpen)"/>
  <text x="646" y="530" text-anchor="start" font-family="Arial" font-size="8.5" font-style="italic" fill="#0369a1">«include»</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="218" y="800" width="664" height="40" rx="5" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="240" y1="820" x2="280" y2="820" stroke="#0369a1" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="288" y="824" font-family="Arial" font-size="9" fill="#0369a1">«include» — always executed</text>
  <line x1="420" y1="820" x2="460" y2="820" stroke="#7c3aed" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="468" y="824" font-family="Arial" font-size="9" fill="#7c3aed">«extend» — conditionally triggered</text>
  <line x1="660" y1="820" x2="700" y2="820" stroke="#92400e" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="708" y="824" font-family="Arial" font-size="9" fill="#92400e">external system notification</text>
</svg>
